project:
  type: website
  output-dir: docs/
  resources:
    - ".nojekyll"


website:
  title: "Market Segmentation in Python"
  description: "A small Quarto site with a synthetic-data segmentation tutorial and a browser-first deployment pattern."
  site-url: "https://robertwwalker.github.io/MSegment/"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: tutorial.qmd
        text: Tutorial
      - href: deployment.qmd
        text: Deployment
      - href: shinylive_demo.qmd
        text: Interactive Demo
    right:
      - icon: github
        href: "https://github.com/robertwwalker/MSegment"
  page-footer:
    left: "Built with Quarto for GitHub Pages."

format:
  html:
    theme: 
       - custom.scss
    toc: true
    code-fold: show
    code-summary: "Show code"
    df-print: paged

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
